name: Build RISC-V toolchain image
on:
  push:
    branches:
      - main
    paths:
      - Dockerfile.riscv-toolchain
      - install-scripts/toolchain.sh
  pull_request:
    paths:
      - Dockerfile.riscv-toolchain
      - install-scripts/toolchain.sh
  workflow_dispatch:

jobs:
  build:
    name: Build and push riscv-toolchain image
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push riscv-toolchain image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.riscv-toolchain
          tags: ghcr.io/${{ github.repository_owner }}/riscv-toolchain:latest
          push: ${{ github.event_name != 'pull_request' }}
